<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selection Sort - Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body>
  <nav class="topbar">
    <a href="../index.html" class="home-link">&larr; CS_basics</a>
    <a href="index.html">Visualizer</a> <span class="sep">/</span>
    <span class="title">Selection Sort</span>
    <button id="theme-toggle">&#127769;</button>
  </nav>
  <div class="container">
    <h1>Selection Sort</h1>
    <p>Find the minimum element and swap it to the front each pass.</p>
    <div class="viz-wrapper">
      <div>
        <div class="viz-canvas-area"><canvas id="canvas"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Sorted</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Current min</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Comparing</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4361ee"></div> Unsorted</div>
        </div>
      </div>
      <div class="viz-controls">
        <h3>Controls</h3>
        <label>Array size: <span id="size-val">20</span></label>
        <input type="range" id="size" min="5" max="50" value="20">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="7">
        <div class="btn-row">
          <button class="btn btn-primary" id="run-btn">Run</button>
          <button class="btn btn-secondary" id="reset-btn">Reset</button>
        </div>
        <div class="complexity">Time: O(n&sup2;) always | Space: O(1) | Not stable</div>
        <h3>Steps</h3>
        <div class="viz-log" id="log"></div>
      </div>
    </div>
  </div>
<script>
(function() {
  var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  var arr=[],running=false,stopped=false,logger=createLogger('log'),highlights={};
  function resize(){var r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width-32;canvas.height=Math.max(r.height-32,300);}
  function genArray(){arr=randomArray(+document.getElementById('size').value,100);highlights={};}
  function draw(){resize();var w=canvas.width,h=canvas.height,n=arr.length;ctx.clearRect(0,0,w,h);var barW=Math.max(2,(w-20)/n-1),gap=1,totalW=n*(barW+gap)-gap,startX=(w-totalW)/2,mx=Math.max.apply(null,arr);for(var i=0;i<n;i++){var x=startX+i*(barW+gap),bH=(arr[i]/mx)*(h-40);ctx.fillStyle=highlights[i]||'#4361ee';ctx.fillRect(x,h-20-bH,barW,bH);}}

  async function run(){
    if(running)return;running=true;stopped=false;logger.clear();highlights={};
    var delay=(11-document.getElementById('speed').value)*20,n=arr.length;
    for(var i=0;i<n-1&&!stopped;i++){
      var minIdx=i; highlights[i]='#e74c3c';
      for(var j=i+1;j<n&&!stopped;j++){highlights[j]='#f39c12';draw();await sleep(delay);if(arr[j]<arr[minIdx]){if(minIdx!==i)highlights[minIdx]='#4361ee';minIdx=j;highlights[minIdx]='#e74c3c';}else{highlights[j]='#4361ee';}draw();}
      if(minIdx!==i){var tmp=arr[i];arr[i]=arr[minIdx];arr[minIdx]=tmp;}
      for(var k=i;k<n;k++)delete highlights[k]; highlights[i]='#2ecc71';draw();
      logger.log('Pass '+(i+1)+': placed '+arr[i]+' at index '+i); await sleep(delay);
    }
    if(!stopped){for(var i=0;i<arr.length;i++)highlights[i]='#2ecc71';draw();logger.log('<span class="highlight">Sorted!</span>');}
    running=false;
  }
  document.getElementById('run-btn').addEventListener('click',run);
  document.getElementById('reset-btn').addEventListener('click',function(){stopped=true;running=false;genArray();logger.clear();draw();});
  document.getElementById('size').addEventListener('input',function(){document.getElementById('size-val').textContent=this.value;genArray();logger.clear();draw();});
  genArray();draw();window.addEventListener('resize',draw);
})();
</script>
</body>
</html>
