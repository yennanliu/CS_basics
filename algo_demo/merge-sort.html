<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge Sort - Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body>
  <nav class="topbar">
    <a href="../index.html" class="home-link">&larr; CS_basics</a>
    <a href="index.html">Visualizer</a> <span class="sep">/</span>
    <span class="title">Merge Sort</span>
    <button id="theme-toggle">&#127769;</button>
  </nav>
  <div class="container">
    <h1>Merge Sort</h1>
    <p>Divide array in half, sort each, then merge. LC 912, 148, 23.</p>
    <div class="viz-wrapper">
      <div>
        <div class="viz-canvas-area"><canvas id="canvas"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4361ee"></div> Default</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Current range</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Merging</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Sorted</div>
        </div>
      </div>
      <div class="viz-controls">
        <h3>Controls</h3>
        <label>Array size: <span id="size-val">16</span></label>
        <input type="range" id="size" min="4" max="40" value="16">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="5">
        <div class="btn-row">
          <button class="btn btn-primary" id="run-btn">Run</button>
          <button class="btn btn-secondary" id="reset-btn">Reset</button>
        </div>
        <div class="complexity">Time: O(n log n) | Space: O(n)</div>
        <h3>Steps</h3>
        <div class="viz-log" id="log"></div>
      </div>
    </div>
  </div>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var arr = [], running = false, stopped = false;
  var logger = createLogger('log');
  var highlights = {};

  function resize() {
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width - 32; canvas.height = Math.max(rect.height - 32, 300);
  }

  function genArray() {
    arr = randomArray(+document.getElementById('size').value, 100);
    highlights = {};
  }

  function draw() {
    resize();
    var w = canvas.width, h = canvas.height, n = arr.length;
    ctx.clearRect(0, 0, w, h);
    var barW = Math.max(2, (w - 20) / n - 1);
    var gap = 1;
    var totalW = n * (barW + gap) - gap;
    var startX = (w - totalW) / 2;
    var maxVal = Math.max.apply(null, arr);

    for (var i = 0; i < n; i++) {
      var x = startX + i * (barW + gap);
      var barH = (arr[i] / maxVal) * (h - 40);
      ctx.fillStyle = highlights[i] || '#4361ee';
      ctx.fillRect(x, h - 20 - barH, barW, barH);
    }
  }

  async function mergeSort(l, r) {
    if (l >= r || stopped) return;
    var mid = Math.floor((l + r) / 2);

    // Highlight range
    for (var i = l; i <= r; i++) highlights[i] = '#f39c12';
    draw();
    logger.log('Split [' + l + '..' + r + '] at mid=' + mid);
    await sleep((11 - document.getElementById('speed').value) * 60);
    for (var i = l; i <= r; i++) delete highlights[i];

    await mergeSort(l, mid);
    await mergeSort(mid + 1, r);
    await merge(l, mid, r);
  }

  async function merge(l, mid, r) {
    if (stopped) return;
    var delay = (11 - document.getElementById('speed').value) * 40;
    var left = arr.slice(l, mid + 1);
    var right = arr.slice(mid + 1, r + 1);
    var i = 0, j = 0, k = l;

    logger.log('Merge [' + l + '..' + mid + '] + [' + (mid+1) + '..' + r + ']');

    while (i < left.length && j < right.length && !stopped) {
      for (var x = l; x <= r; x++) highlights[x] = '#e74c3c';
      draw(); await sleep(delay);
      if (left[i] <= right[j]) { arr[k] = left[i]; i++; }
      else { arr[k] = right[j]; j++; }
      highlights[k] = '#2ecc71';
      k++;
      draw(); await sleep(delay);
    }
    while (i < left.length && !stopped) { arr[k] = left[i]; highlights[k] = '#2ecc71'; i++; k++; draw(); await sleep(delay); }
    while (j < right.length && !stopped) { arr[k] = right[j]; highlights[k] = '#2ecc71'; j++; k++; draw(); await sleep(delay); }
    for (var x = l; x <= r; x++) delete highlights[x];
    draw();
  }

  async function run() {
    if (running) return;
    running = true; stopped = false;
    logger.clear(); highlights = {};
    await mergeSort(0, arr.length - 1);
    if (!stopped) {
      for (var i = 0; i < arr.length; i++) highlights[i] = '#2ecc71';
      draw();
      logger.log('<span class="highlight">Sorted!</span>');
    }
    running = false;
  }

  document.getElementById('run-btn').addEventListener('click', run);
  document.getElementById('reset-btn').addEventListener('click', function() {
    stopped = true; running = false; genArray(); logger.clear(); draw();
  });
  document.getElementById('size').addEventListener('input', function() {
    document.getElementById('size-val').textContent = this.value;
    genArray(); logger.clear(); draw();
  });

  genArray(); draw();
  window.addEventListener('resize', draw);
})();
</script>
</body>
</html>
