<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Sort - Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body>
  <nav class="topbar">
    <a href="index.html">Visualizer</a> <span class="sep">/</span>
    <span class="title">Quick Sort</span>
    <button id="theme-toggle">&#127769;</button>
  </nav>
  <div class="container">
    <h1>Quick Sort</h1>
    <p>Choose pivot, partition, recurse. LC 912, 215 (Kth Largest).</p>
    <div class="viz-wrapper">
      <div>
        <div class="viz-canvas-area"><canvas id="canvas"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4361ee"></div> Default</div>
          <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div> Pivot</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Comparing</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Placed</div>
        </div>
      </div>
      <div class="viz-controls">
        <h3>Controls</h3>
        <label>Array size: <span id="size-val">20</span></label>
        <input type="range" id="size" min="5" max="50" value="20">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="6">
        <div class="btn-row">
          <button class="btn btn-primary" id="run-btn">Run</button>
          <button class="btn btn-secondary" id="reset-btn">Reset</button>
        </div>
        <div class="complexity">Time: O(n log n) avg | Space: O(log n)</div>
        <h3>Steps</h3>
        <div class="viz-log" id="log"></div>
      </div>
    </div>
  </div>
<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var arr = [], running = false, stopped = false;
  var logger = createLogger('log');
  var highlights = {};

  function resize() {
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width - 32; canvas.height = Math.max(rect.height - 32, 300);
  }

  function genArray() { arr = randomArray(+document.getElementById('size').value, 100); highlights = {}; }

  function draw() {
    resize();
    var w = canvas.width, h = canvas.height, n = arr.length;
    ctx.clearRect(0, 0, w, h);
    var barW = Math.max(2, (w - 20) / n - 1), gap = 1;
    var totalW = n * (barW + gap) - gap, startX = (w - totalW) / 2;
    var maxVal = Math.max.apply(null, arr);
    for (var i = 0; i < n; i++) {
      var x = startX + i * (barW + gap);
      var barH = (arr[i] / maxVal) * (h - 40);
      ctx.fillStyle = highlights[i] || '#4361ee';
      ctx.fillRect(x, h - 20 - barH, barW, barH);
    }
  }

  async function quickSort(lo, hi) {
    if (lo >= hi || stopped) return;
    var pi = await partition(lo, hi);
    if (stopped) return;
    highlights[pi] = '#2ecc71';
    draw();
    await quickSort(lo, pi - 1);
    await quickSort(pi + 1, hi);
  }

  async function partition(lo, hi) {
    var delay = (11 - document.getElementById('speed').value) * 30;
    var pivot = arr[hi];
    highlights[hi] = '#9b59b6';
    logger.log('Pivot=' + pivot + ' range [' + lo + '..' + hi + ']');
    draw(); await sleep(delay);

    var i = lo;
    for (var j = lo; j < hi && !stopped; j++) {
      highlights[j] = '#e74c3c';
      draw(); await sleep(delay);
      if (arr[j] < pivot) {
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        highlights[i] = '#f39c12';
        i++;
      }
      if (j !== hi) delete highlights[j];
      draw(); await sleep(delay);
    }
    var tmp = arr[i]; arr[i] = arr[hi]; arr[hi] = tmp;
    // Clean up highlights for this partition
    for (var k = lo; k <= hi; k++) delete highlights[k];
    highlights[i] = '#2ecc71';
    draw();
    return i;
  }

  async function run() {
    if (running) return;
    running = true; stopped = false;
    logger.clear(); highlights = {};
    await quickSort(0, arr.length - 1);
    if (!stopped) {
      for (var i = 0; i < arr.length; i++) highlights[i] = '#2ecc71';
      draw();
      logger.log('<span class="highlight">Sorted!</span>');
    }
    running = false;
  }

  document.getElementById('run-btn').addEventListener('click', run);
  document.getElementById('reset-btn').addEventListener('click', function() {
    stopped = true; running = false; genArray(); logger.clear(); draw();
  });
  document.getElementById('size').addEventListener('input', function() {
    document.getElementById('size-val').textContent = this.value;
    genArray(); logger.clear(); draw();
  });

  genArray(); draw();
  window.addEventListener('resize', draw);
})();
</script>
</body>
</html>
