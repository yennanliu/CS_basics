<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadane's Algorithm - Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body>
  <nav class="topbar">
    <a href="../index.html" class="home-link">&larr; CS_basics</a>
    <a href="index.html">Visualizer</a> <span class="sep">/</span>
    <span class="title">Kadane's Algorithm</span>
    <button id="theme-toggle">&#127769;</button>
  </nav>
  <div class="container">
    <h1>Kadane's Algorithm</h1>
    <p>Find maximum subarray sum in O(n). LC 53, 152, 918.</p>
    <div class="viz-wrapper">
      <div>
        <div class="viz-canvas-area"><canvas id="canvas"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4361ee"></div> Array element</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Current scan</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Current subarray</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Max subarray</div>
        </div>
      </div>
      <div class="viz-controls">
        <h3>Controls</h3>
        <label>Array size: <span id="size-val">15</span></label>
        <input type="range" id="size" min="5" max="25" value="15">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="5">
        <div class="btn-row">
          <button class="btn btn-primary" id="run-btn">Run</button>
          <button class="btn btn-secondary" id="reset-btn">Reset</button>
        </div>
        <div class="complexity">Time: O(n) | Space: O(1)</div>
        <h3>Steps</h3>
        <div class="viz-log" id="log"></div>
      </div>
    </div>
  </div>
<script>
(function() {
  var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  var arr=[],running=false,stopped=false,logger=createLogger('log');

  function resize(){var r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width-32;canvas.height=Math.max(r.height-32,300);}
  function genArray(){
    var n=+document.getElementById('size').value;arr=[];
    for(var i=0;i<n;i++) arr.push(Math.floor(Math.random()*41)-20); // range [-20,20]
  }

  function draw(curIdx,curStart,bestStart,bestEnd,curSum,maxSum){
    resize();var w=canvas.width,h=canvas.height,n=arr.length;ctx.clearRect(0,0,w,h);
    var barW=Math.min(50,(w-40)/n-4),gap=4,totalW=n*(barW+gap)-gap,startX=(w-totalW)/2;
    var maxAbs=Math.max.apply(null,arr.map(function(v){return Math.abs(v);}));
    if(maxAbs===0)maxAbs=1;
    var midY=h/2+10;

    for(var i=0;i<n;i++){
      var x=startX+i*(barW+gap);
      var barH=Math.abs(arr[i]/maxAbs)*(h/2-50);
      var y=arr[i]>=0?midY-barH:midY;
      var color='#4361ee';
      if(bestStart!==undefined&&i>=bestStart&&i<=bestEnd) color='#2ecc71';
      if(curStart!==undefined&&i>=curStart&&i<=curIdx) color='#f39c12';
      if(i===curIdx) color='#e74c3c';
      ctx.fillStyle=color;
      ctx.beginPath();ctx.roundRect(x,y,barW,barH||2,3);ctx.fill();
      // Value
      ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#ccc':'#333';
      ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(arr[i],x+barW/2,arr[i]>=0?y-8:y+barH+14);
    }
    // Zero line
    ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(startX-10,midY);ctx.lineTo(startX+totalW+10,midY);ctx.stroke();
    ctx.setLineDash([]);
    // Info
    if(curSum!==undefined){
      ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#ccc':'#333';
      ctx.font='13px sans-serif';ctx.textAlign='left';
      ctx.fillText('curSum: '+curSum,10,30);
      ctx.fillText('maxSum: '+maxSum,10,50);
    }
  }

  async function run(){
    if(running)return;running=true;stopped=false;logger.clear();
    var delay=(11-document.getElementById('speed').value)*120;
    var curSum=0,maxSum=arr[0],curStart=0,bestStart=0,bestEnd=0;
    draw();await sleep(delay);

    for(var i=0;i<arr.length&&!stopped;i++){
      curSum+=arr[i];
      logger.log('i='+i+' val='+arr[i]+' curSum='+curSum);

      if(curSum>maxSum){maxSum=curSum;bestStart=curStart;bestEnd=i;
        logger.log('&nbsp;&nbsp;<span class="highlight">New max='+maxSum+' ['+bestStart+'..'+bestEnd+']</span>');
      }
      draw(i,curStart,bestStart,bestEnd,curSum,maxSum);await sleep(delay);

      if(curSum<0){
        logger.log('&nbsp;&nbsp;curSum<0, reset to 0');
        curSum=0;curStart=i+1;
        draw(i,curStart,bestStart,bestEnd,curSum,maxSum);await sleep(delay/2);
      }
    }
    if(!stopped){
      draw(undefined,undefined,bestStart,bestEnd,curSum,maxSum);
      logger.log('<span class="highlight">Max subarray sum = '+maxSum+' at ['+bestStart+'..'+bestEnd+']</span>');
    }
    running=false;
  }

  document.getElementById('run-btn').addEventListener('click',run);
  document.getElementById('reset-btn').addEventListener('click',function(){stopped=true;running=false;genArray();logger.clear();draw();});
  document.getElementById('size').addEventListener('input',function(){document.getElementById('size-val').textContent=this.value;genArray();logger.clear();draw();});
  genArray();draw();window.addEventListener('resize',draw);
})();
</script>
</body>
</html>
