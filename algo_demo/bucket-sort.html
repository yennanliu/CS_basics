<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bucket Sort - Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body>
  <nav class="topbar">
    <a href="../index.html" class="home-link">&larr; CS_basics</a>
    <a href="index.html">Visualizer</a> <span class="sep">/</span>
    <span class="title">Bucket Sort</span>
    <button id="theme-toggle">&#127769;</button>
  </nav>
  <div class="container">
    <h1>Bucket Sort</h1>
    <p>Distribute elements into buckets, sort each bucket, concatenate. LC 347, 451.</p>
    <div class="viz-wrapper">
      <div>
        <div class="viz-canvas-area"><canvas id="canvas"></canvas></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4361ee"></div> Distributing</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Sorting bucket</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Collected</div>
        </div>
      </div>
      <div class="viz-controls">
        <h3>Controls</h3>
        <label>Array size: <span id="size-val">20</span></label>
        <input type="range" id="size" min="5" max="40" value="20">
        <label>Buckets: <span id="bkt-val">5</span></label>
        <input type="range" id="buckets" min="3" max="10" value="5">
        <label>Speed</label>
        <input type="range" id="speed" min="1" max="10" value="6">
        <div class="btn-row">
          <button class="btn btn-primary" id="run-btn">Run</button>
          <button class="btn btn-secondary" id="reset-btn">Reset</button>
        </div>
        <div class="complexity">Avg: O(n+k) | Worst: O(n&sup2;) | Space: O(n+k)</div>
        <h3>Steps</h3>
        <div class="viz-log" id="log"></div>
      </div>
    </div>
  </div>
<script>
(function() {
  var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  var arr=[],running=false,stopped=false,logger=createLogger('log'),highlights={};
  function resize(){var r=canvas.parentElement.getBoundingClientRect();canvas.width=r.width-32;canvas.height=Math.max(r.height-32,300);}
  function genArray(){arr=randomArray(+document.getElementById('size').value,100);highlights={};}
  function draw(){resize();var w=canvas.width,h=canvas.height,n=arr.length;ctx.clearRect(0,0,w,h);var barW=Math.max(2,(w-20)/n-1),gap=1,totalW=n*(barW+gap)-gap,startX=(w-totalW)/2,mx=Math.max.apply(null,arr);for(var i=0;i<n;i++){var x=startX+i*(barW+gap),bH=(arr[i]/mx)*(h-40);ctx.fillStyle=highlights[i]||'#4361ee';ctx.fillRect(x,h-20-bH,barW,bH);}}

  async function run(){
    if(running)return;running=true;stopped=false;logger.clear();highlights={};
    var delay=(11-document.getElementById('speed').value)*40,n=arr.length;
    var numBuckets=+document.getElementById('buckets').value;
    var mx=Math.max.apply(null,arr)+1;
    var buckets=[];for(var i=0;i<numBuckets;i++)buckets.push([]);

    // Distribute
    logger.log('Distributing into '+numBuckets+' buckets...');
    for(var i=0;i<n&&!stopped;i++){
      var bi=Math.floor(arr[i]*numBuckets/mx);
      buckets[bi].push(arr[i]);
      highlights[i]='#f39c12';draw();
      logger.log(arr[i]+' &rarr; bucket '+bi);
      await sleep(delay);highlights[i]='#bbb';draw();
    }

    // Sort each bucket and collect
    var idx=0;
    for(var b=0;b<numBuckets&&!stopped;b++){
      buckets[b].sort(function(a,c){return a-c;});
      logger.log('Bucket '+b+': ['+buckets[b].join(', ')+']');
      for(var j=0;j<buckets[b].length&&!stopped;j++){
        arr[idx]=buckets[b][j];highlights[idx]='#2ecc71';draw();await sleep(delay);idx++;
      }
    }
    if(!stopped){draw();logger.log('<span class="highlight">Sorted!</span>');}
    running=false;
  }
  document.getElementById('run-btn').addEventListener('click',run);
  document.getElementById('reset-btn').addEventListener('click',function(){stopped=true;running=false;genArray();logger.clear();draw();});
  document.getElementById('size').addEventListener('input',function(){document.getElementById('size-val').textContent=this.value;genArray();logger.clear();draw();});
  document.getElementById('buckets').addEventListener('input',function(){document.getElementById('bkt-val').textContent=this.value;});
  genArray();draw();window.addEventListener('resize',draw);
})();
</script>
</body>
</html>
