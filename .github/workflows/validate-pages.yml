name: Validate GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'doc/**'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
      - '.github/workflows/validate-pages.yml'
      - 'algo_demo/**'
      - 'build-*.js'
      - 'ensure-nav-pages.js'
      - 'package.json'
      - 'package-lock.json'
      - 'style.css'
      - 'vendor/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'doc/**'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
      - '.github/workflows/validate-pages.yml'
      - 'algo_demo/**'
      - 'build-*.js'
      - 'ensure-nav-pages.js'
      - 'package.json'
      - 'package-lock.json'
      - 'style.css'
      - 'vendor/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: |
        mkdir -p _site/doc
        cp -r doc/pic _site/doc/pic
        mkdir -p _site/faqs
        node build-site.js
        cp style.css _site/style.css
        mkdir -p _site/vendor/highlight
        cp node_modules/highlight.js/styles/github-dark.min.css _site/vendor/highlight/github-dark.min.css
        curl -sSfL "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" \
          -o _site/vendor/highlight/highlight.min.js
        cp vendor/fonts.css _site/vendor/fonts.css
        curl -sSfL "https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" \
          -o _site/vendor/inter.woff2
        curl -sSfL "https://fonts.gstatic.com/s/jetbrainsmono/v24/tDbv2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKwBNntkaToggR7BYRbKPxDcwgknk-4.woff2" \
          -o _site/vendor/jetbrains-mono.woff2

    - name: Validate generated HTML files
      run: |
        cat > validate-site.js << 'VALIDATESCRIPT'
        const fs = require('fs');
        const path = require('path');

        let errors = 0;
        let warnings = 0;

        function error(msg) { console.error(`ERROR: ${msg}`); errors++; }
        function warn(msg) { console.warn(`WARN: ${msg}`); warnings++; }
        function info(msg) { console.log(`INFO: ${msg}`); }

        // ──────────────────────────────────────────────
        // 1. Check required files exist
        // ──────────────────────────────────────────────
        info('=== Checking required files ===');
        const requiredFiles = [
          '_site/index.html',
          '_site/resources.html',
          '_site/cheatsheets.html',
          '_site/faqs.html',
          '_site/patterns.html',
          '_site/style.css'
        ];

        for (const file of requiredFiles) {
          if (!fs.existsSync(file)) {
            error(`Required file missing: ${file}`);
          } else {
            const stat = fs.statSync(file);
            if (stat.size === 0) {
              error(`Required file is empty: ${file}`);
            }
          }
        }

        // ──────────────────────────────────────────────
        // 2. Check cheatsheet HTML files exist
        // ──────────────────────────────────────────────
        info('=== Checking cheatsheet pages ===');
        const cheatsheetDir = '_site/cheatsheets';
        if (!fs.existsSync(cheatsheetDir)) {
          error('Cheatsheet directory missing: _site/cheatsheets/');
        } else {
          const cheatsheetFiles = fs.readdirSync(cheatsheetDir).filter(f => f.endsWith('.html'));
          if (cheatsheetFiles.length === 0) {
            error('No cheatsheet HTML files generated');
          } else {
            info(`Found ${cheatsheetFiles.length} cheatsheet pages`);
          }

          // Spot-check key cheatsheets exist
          const expectedCheatsheets = ['heap.html', 'array.html', 'dp.html', 'graph.html', 'binary_search.html', 'stack.html'];
          for (const expected of expectedCheatsheets) {
            if (!cheatsheetFiles.includes(expected)) {
              error(`Expected cheatsheet missing: ${expected}`);
            }
          }
        }

        // ──────────────────────────────────────────────
        // 3. Check FAQ HTML files exist
        // ──────────────────────────────────────────────
        info('=== Checking FAQ pages ===');
        const faqDir = '_site/faqs';
        if (!fs.existsSync(faqDir)) {
          error('FAQ directory missing: _site/faqs/');
        } else {
          const faqFiles = fs.readdirSync(faqDir).filter(f => f.endsWith('.html'));
          if (faqFiles.length === 0) {
            error('No FAQ HTML files generated');
          } else {
            info(`Found ${faqFiles.length} FAQ pages`);
          }
        }

        // ──────────────────────────────────────────────
        // 4. Validate HTML structure and content
        // ──────────────────────────────────────────────
        info('=== Validating HTML structure ===');

        function validateHtmlFile(filePath) {
          const html = fs.readFileSync(filePath, 'utf8');
          const relPath = path.relative('_site', filePath);

          // Check DOCTYPE
          if (!html.includes('<!DOCTYPE html>')) {
            error(`${relPath}: Missing <!DOCTYPE html>`);
          }

          // Check essential meta tags
          if (!html.includes('<meta charset="UTF-8">')) {
            error(`${relPath}: Missing charset meta tag`);
          }
          if (!html.includes('viewport')) {
            error(`${relPath}: Missing viewport meta tag`);
          }

          // Check title
          if (!html.includes('<title>') || !html.includes('</title>')) {
            error(`${relPath}: Missing <title> tag`);
          }
          if (html.includes('<title> - CS_basics</title>') || html.includes('<title>undefined')) {
            error(`${relPath}: Empty or undefined title`);
          }

          // Check navbar
          if (!html.includes('class="navbar"') && !html.includes("class='navbar'")) {
            error(`${relPath}: Missing navbar`);
          }
          if (!html.includes('nav-links')) {
            error(`${relPath}: Missing nav-links`);
          }

          // Check navigation links exist
          if (!html.includes('index.html')) {
            warn(`${relPath}: Missing Home link`);
          }
          if (!html.includes('cheatsheets.html')) {
            warn(`${relPath}: Missing Cheat Sheets link`);
          }

          // Check footer
          if (!html.includes('<footer>')) {
            error(`${relPath}: Missing footer`);
          }

          // Check for broken GitHub blob image URLs (should have been converted)
          const blobImageMatches = html.match(/src\s*=\s*"https:\/\/github\.com\/[^"]*\/blob\/[^"]*\.(png|jpg|jpeg|gif|svg|webp)"/gi);
          if (blobImageMatches) {
            for (const match of blobImageMatches) {
              error(`${relPath}: Unconverted GitHub blob image URL: ${match}`);
            }
          }

          // Check for broken relative image paths (../pic/ should not appear in final HTML)
          const relativeImageMatches = html.match(/src\s*=\s*"\.\.\/pic\/[^"]*"/gi);
          if (relativeImageMatches) {
            for (const match of relativeImageMatches) {
              error(`${relPath}: Unconverted relative image path: ${match}`);
            }
          }

          // Check that all local image references point to existing files
          const imgSrcRegex = /src\s*=\s*"((?:\.\.\/)?doc\/pic\/[^"]+)"/g;
          let imgMatch;
          while ((imgMatch = imgSrcRegex.exec(html)) !== null) {
            const imgSrc = imgMatch[1];
            // Resolve path relative to the HTML file's directory
            const htmlDir = path.dirname(filePath);
            const imgPath = path.resolve(htmlDir, imgSrc);
            if (!fs.existsSync(imgPath)) {
              warn(`${relPath}: Image not found: ${imgSrc} (resolved: ${imgPath})`);
            }
          }

          // Check for empty content (page rendered but has no meaningful content)
          const mainContent = html.match(/<main[^>]*>([\s\S]*?)<\/main>/);
          if (mainContent) {
            const stripped = mainContent[1].replace(/<[^>]*>/g, '').trim();
            if (stripped.length < 10) {
              warn(`${relPath}: Page has very little content (${stripped.length} chars)`);
            }
          }

          return html;
        }

        // Validate all root-level HTML files
        for (const file of requiredFiles.filter(f => f.endsWith('.html'))) {
          if (fs.existsSync(file)) {
            validateHtmlFile(file);
          }
        }

        // Validate cheatsheet HTML files
        if (fs.existsSync(cheatsheetDir)) {
          const cheatsheetFiles = fs.readdirSync(cheatsheetDir).filter(f => f.endsWith('.html'));
          for (const file of cheatsheetFiles) {
            validateHtmlFile(path.join(cheatsheetDir, file));
          }
        }

        // Validate FAQ HTML files
        if (fs.existsSync(faqDir)) {
          const faqFiles = fs.readdirSync(faqDir).filter(f => f.endsWith('.html'));
          for (const file of faqFiles) {
            validateHtmlFile(path.join(faqDir, file));
          }
        }

        // ──────────────────────────────────────────────
        // 5. Validate internal link consistency
        // ──────────────────────────────────────────────
        info('=== Checking internal links ===');

        function checkInternalLinks(filePath) {
          const html = fs.readFileSync(filePath, 'utf8');
          const relPath = path.relative('_site', filePath);
          const htmlDir = path.dirname(filePath);

          // Find all href links that are internal (not http/https/mailto/#)
          const hrefRegex = /href="([^"#][^"]*\.html(?:#[^"]*)?)"/g;
          let match;
          while ((match = hrefRegex.exec(html)) !== null) {
            const href = match[1].split('#')[0]; // Remove anchor
            if (href.startsWith('http://') || href.startsWith('https://') || href.startsWith('mailto:')) {
              continue;
            }
            const targetPath = path.resolve(htmlDir, href);
            if (!fs.existsSync(targetPath)) {
              warn(`${relPath}: Broken internal link: ${href}`);
            }
          }
        }

        // Check links in index pages
        for (const file of requiredFiles.filter(f => f.endsWith('.html'))) {
          if (fs.existsSync(file)) {
            checkInternalLinks(file);
          }
        }

        // ──────────────────────────────────────────────
        // 6. Validate image directory
        // ──────────────────────────────────────────────
        info('=== Checking image assets ===');
        const imgDir = '_site/doc/pic';
        if (!fs.existsSync(imgDir)) {
          error('Image directory missing: _site/doc/pic/');
        } else {
          const imgFiles = fs.readdirSync(imgDir, { recursive: true });
          const imageCount = imgFiles.filter(f =>
            /\.(png|jpg|jpeg|gif|svg|webp)$/i.test(String(f))
          ).length;
          if (imageCount === 0) {
            error('No image files found in _site/doc/pic/');
          } else {
            info(`Found ${imageCount} image files in _site/doc/pic/`);
          }
        }

        // ──────────────────────────────────────────────
        // Summary
        // ──────────────────────────────────────────────
        console.log('\n========================================');
        console.log(`Validation complete: ${errors} errors, ${warnings} warnings`);
        console.log('========================================');

        if (errors > 0) {
          process.exit(1);
        }
        VALIDATESCRIPT

        node validate-site.js
