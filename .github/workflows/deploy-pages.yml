name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'leetcode_java/**'
      - 'leetcode_python/**'
      - 'leetcode_SQL/**'
      - 'leetcode_scala/**'
      - 'algorithm/**'
      - 'data_structure/**'
      - 'ref_code/**'
      - 'script/**'
  workflow_dispatch:  # Allows manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('site/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies
      run: npm ci --prefix site

    - name: Build site
      run: |
        mkdir -p _site/doc
        cp -r doc/pic _site/doc/pic
        mkdir -p _site/faqs
        node site/build-site.js

    - name: Copy CSS
      run: cp site/style.css _site/style.css

    - name: Bundle vendor assets (highlight.js + fonts)
      run: |
        mkdir -p _site/vendor/highlight
        cp site/node_modules/highlight.js/styles/github-dark.min.css _site/vendor/highlight/github-dark.min.css
        curl -sSfL "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" \
          -o _site/vendor/highlight/highlight.min.js
        cp vendor/fonts.css _site/vendor/fonts.css
        curl -sSfL "https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" \
          -o _site/vendor/inter.woff2
        curl -sSfL "https://fonts.gstatic.com/s/jetbrainsmono/v24/tDbv2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKwBNntkaToggR7BYRbKPxDcwgknk-4.woff2" \
          -o _site/vendor/jetbrains-mono.woff2

    - name: Create 404 page
      run: |
        cat > _site/404.html << 'EOF404'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>404 - Page Not Found</title>
          <link rel="stylesheet" href="/CS_basics/style.css">
        </head>
        <body>
          <div class="container" style="text-align: center; padding: 4rem 2rem;">
            <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
            <h2>Page Not Found</h2>
            <p style="margin: 2rem 0;">The page you're looking for doesn't exist.</p>
            <a href="/" style="display: inline-block; padding: 0.75rem 1.5rem; background: #222; color: white; border-radius: 6px; text-decoration: none;">Go Home</a>
          </div>
        </body>
        </html>
        EOF404

    - name: Copy algo_demo visualizations
      run: |
        if [ -d "algo_demo" ]; then
          cp -r algo_demo _site/algo_demo
          echo "Copied algo_demo to _site/algo_demo"
        fi

    - name: Build LeetCode data (JSON only)
      run: node site/build-leetcode.js

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
