name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: |
        mkdir -p _site/doc
        cp -r doc/pic _site/doc/pic
        mkdir -p _site/faqs
        node build-site.js

    - name: Copy CSS
      run: cp style.css _site/style.css

    - name: Create 404 page
      run: |
        cat > _site/404.html << 'EOF404'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>404 - Page Not Found</title>
          <link rel="stylesheet" href="/CS_basics/style.css">
        </head>
        <body>
          <div class="container" style="text-align: center; padding: 4rem 2rem;">
            <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
            <h2>Page Not Found</h2>
            <p style="margin: 2rem 0;">The page you're looking for doesn't exist.</p>
            <a href="/" style="display: inline-block; padding: 0.75rem 1.5rem; background: #222; color: white; border-radius: 6px; text-decoration: none;">Go Home</a>
          </div>
        </body>
        </html>
        EOF404

    - name: Copy algo_demo visualizations
      run: |
        if [ -d "algo_demo" ]; then
          cp -r algo_demo _site/algo_demo
          echo "Copied algo_demo to _site/algo_demo"
        fi

    - name: Build LeetCode Explorer page
      run: node build-leetcode.js

    - name: Ensure navigation pages exist
      run: node ensure-nav-pages.js

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
